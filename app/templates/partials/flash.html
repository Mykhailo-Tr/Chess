{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="space-y-2 mb-4">
    {% for category, message in messages %}
    <div class="rounded-lg px-4 py-3 text-sm
        {% if category == 'success' %}bg-emerald-900/60 text-emerald-200{% endif %}
        {% if category == 'danger' %}bg-rose-900/60 text-rose-200{% endif %}
        {% if category == 'warning' %}bg-amber-900/60 text-amber-200{% endif %}
        {% if category == 'info' %}bg-sky-900/60 text-sky-200{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}
