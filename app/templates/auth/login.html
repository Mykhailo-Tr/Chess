{% extends "base.html" %}
{% block title %}Connect Lichess{% endblock %}
{% block public_content %}
<section class="min-h-screen bg-[#080c12] flex items-center justify-center px-6 py-16 relative overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_12%_10%,rgba(0,217,126,0.10),transparent_35%)]"></div>
    <div class="relative w-full max-w-md mx-auto">
        <div class="text-center text-[#00d97e] text-[32px] mb-4">?</div>
        <div class="bg-[#0d1117] border border-white/10 rounded-xl p-10">
            <h1 class="text-center text-[18px] font-semibold text-ink mb-1">Behavioral Chess</h1>
            <p class="text-center text-[13px] text-white/40 mb-8">Analytics platform</p>
            <div class="flex flex-wrap justify-center gap-2 mb-8">
                <span class="tag">Tilt Detection</span>
                <span class="tag">Opening Insights</span>
                <span class="tag">Time Management</span>
                <span class="tag">Weakness Reports</span>
            </div>
            <form method="post" action="{{ url_for('auth.token_login') }}">
                <button type="submit" class="btn-primary w-full py-2.5 justify-center">
                    Enter Dashboard
                </button>
            </form>
        </div>
        <p class="text-center text-[11px] text-white/25 mt-4">Uses your Lichess personal token</p>
    </div>
</section>
{% endblock %}
