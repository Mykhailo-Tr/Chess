services:
  web:
    build: .
    container_name: chess-web
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 run:app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///chess_behavioral.db}
      - FLASK_ENV=${FLASK_ENV:-development}
    volumes:
      - ./instance:/app/instance
